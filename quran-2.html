<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --dark: #0d1117;
  --dark2: #161b22;
  --dark3: #1c2333;
  --green: #1a6b3c;
  --green-light: #2d9e5f;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --border: rgba(201,168,76,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(201,168,76,0.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(26,107,60,0.05) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0d1117 0%, #1a2332 50%, #0d1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  position: sticky; top:0; z-index:100;
}
.header-inner {
  max-width: 600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo {
  font-family: 'Amiri', serif;
  font-size: 22px; color: var(--gold);
  letter-spacing: 1px;
}
.header-btns { display:flex; gap:8px; }
.icon-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--border);
  color: var(--gold); border-radius: 10px;
  width: 38px; height: 38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition: all 0.2s;
}
.icon-btn:hover { background: rgba(201,168,76,0.2); }

/* Tabs */
.tabs {
  display:flex; background: var(--dark2);
  border-bottom: 1px solid var(--border);
  max-width:600px; margin:0 auto;
}
.tab {
  flex:1; padding: 12px 8px; text-align:center;
  font-size:14px; cursor:pointer; color:var(--text-dim);
  border-bottom: 2px solid transparent; transition: all 0.2s;
  font-family:'Cairo',sans-serif;
}
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* Search */
.search-wrap {
  max-width:600px; margin:0 auto;
  padding:12px 16px;
}
.search-box {
  display:flex; gap:8px; align-items:center;
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 10px 16px;
}
.search-box input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:15px;
  text-align:right;
}
.search-box input::placeholder { color:var(--text-dim); }
.search-icon { color:var(--gold); font-size:18px; }

/* Surah List */
.list-wrap { max-width:600px; margin:0 auto; padding:0 16px 80px; }
.surah-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; margin-bottom:8px;
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 16px; cursor:pointer;
  transition: all 0.25s; position:relative; overflow:hidden;
}
.surah-card::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg, rgba(201,168,76,0.05), transparent);
  opacity:0; transition:opacity 0.25s;
}
.surah-card:hover::before { opacity:1; }
.surah-card:hover { border-color:rgba(201,168,76,0.4); transform:translateX(-2px); }
.surah-num {
  width:42px; height:42px; min-width:42px;
  background: linear-gradient(135deg, var(--green), var(--green-light));
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:white;
}
.surah-info { flex:1; }
.surah-name { font-family:'Amiri',serif; font-size:20px; color:var(--gold); }
.surah-meta { font-size:12px; color:var(--text-dim); margin-top:2px; }
.surah-arabic { font-family:'Amiri Quran',serif; font-size:18px; color:var(--text-dim); }

/* Quran Reader */
.reader-wrap { max-width:600px; margin:0 auto; display:none; }
.reader-header {
  padding:16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.back-btn {
  background: rgba(201,168,76,0.1);
  border:1px solid var(--border); color:var(--gold);
  border-radius:10px; padding:8px 14px; cursor:pointer;
  font-family:'Cairo',sans-serif; font-size:14px;
  display:flex; align-items:center; gap:6px;
}
.reader-title { font-family:'Amiri',serif; font-size:22px; color:var(--gold); flex:1; text-align:center; }

/* Bismillah */
.bismillah {
  text-align:center; padding:24px 16px;
  font-family:'Amiri Quran',serif; font-size:28px;
  color:var(--gold); line-height:2;
  border-bottom:1px solid var(--border);
}

/* Ayah */
.ayahs-wrap { padding:16px; }
.ayah-block {
  margin-bottom:16px;
  background: var(--dark2);
  border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
  transition: all 0.2s;
}
.ayah-block:hover { border-color:rgba(201,168,76,0.4); }
.ayah-text {
  font-family:'Amiri Quran',serif;
  font-size:24px; line-height:2.2;
  color:var(--text); padding:20px 20px 12px;
  text-align:right; direction:rtl;
}
.ayah-num-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius:50%; font-size:11px; color:#000; font-weight:700;
  margin-right:8px; font-family:'Cairo',sans-serif; vertical-align:middle;
}
.ayah-actions {
  display:flex; gap:8px; padding:10px 16px 14px;
  border-top:1px solid rgba(201,168,76,0.1);
}
.ayah-btn {
  flex:1; padding:8px; border-radius:10px; cursor:pointer;
  font-family:'Cairo',sans-serif; font-size:13px;
  border:1px solid var(--border); transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.tafsir-btn { background:rgba(26,107,60,0.2); color:#5cb85c; }
.tafsir-btn:hover { background:rgba(26,107,60,0.4); }
.share-btn { background:rgba(201,168,76,0.1); color:var(--gold); }
.share-btn:hover { background:rgba(201,168,76,0.2); }

/* Tafsir Panel */
.tafsir-panel {
  display:none; padding:16px;
  background: linear-gradient(135deg, rgba(26,107,60,0.1), rgba(26,107,60,0.05));
  border-top:1px solid rgba(26,107,60,0.2);
  font-size:15px; line-height:2; color:var(--text);
  direction:rtl; text-align:right;
}
.tafsir-panel.open { display:block; }
.tafsir-title {
  font-family:'Amiri',serif; font-size:17px;
  color:var(--green-light); margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}

/* Translation panel */
.trans-panel {
  display:none; padding:14px 16px;
  background: rgba(201,168,76,0.05);
  border-top:1px solid var(--border);
  font-size:14px; line-height:1.8; color:var(--text-dim);
  direction:ltr; text-align:left;
}
.trans-panel.open { display:block; }

/* Toast */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background: linear-gradient(135deg, var(--green), var(--green-light));
  color:white; padding:12px 24px; border-radius:50px;
  font-size:14px; font-family:'Cairo',sans-serif;
  opacity:0; transition:opacity 0.3s; z-index:200; pointer-events:none;
  white-space:nowrap;
}
.toast.show { opacity:1; }

/* Bottom nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background: var(--dark2); border-top:1px solid var(--border);
  display:flex; z-index:100;
}
.nav-item {
  flex:1; padding:10px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; color:var(--text-dim); transition:all 0.2s; font-size:11px;
  font-family:'Cairo',sans-serif;
}
.nav-item.active { color:var(--gold); }
.nav-icon { font-size:20px; }

/* Page sections */
.page { display:none; }
.page.active { display:block; }

/* Surah header decoration */
.surah-header-deco {
  text-align:center; padding:20px 16px 0;
}
.surah-header-deco .deco-line {
  height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:12px 0;
}
.surah-type-badge {
  display:inline-block; padding:4px 14px;
  background:rgba(201,168,76,0.1); border:1px solid var(--border);
  border-radius:50px; font-size:12px; color:var(--gold);
}

/* Font size control */
.font-controls {
  display:flex; gap:8px; align-items:center;
  padding:8px 16px; border-bottom:1px solid var(--border);
  justify-content:flex-end;
}
.font-btn {
  background:rgba(201,168,76,0.1); border:1px solid var(--border);
  color:var(--gold); border-radius:8px; width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px;
}
.font-label { font-size:12px; color:var(--text-dim); }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--dark); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.ayah-block { animation: fadeIn 0.3s ease both; }
</style>
</head>

  <div class="nav-item" id="nav-search" onclick="focusSearch()">

  </div>
</div>

// For surahs without data, generate placeholder
function getAyahs(surahId, count) {
  if (AYAHS_DATA[surahId]) return AYAHS_DATA[surahId];
  const placeholders = [];
  for(let i=1;i<=Math.min(count,10);i++){
    placeholders.push({
      ar:`الآية الكريمة رقم ${i} من هذه السورة المباركة`,
      en:`Verse ${i} of this blessed surah`,
      tafsir:`تفسير الآية ${i}: هذه الآية الكريمة من سورة عظيمة من كتاب الله العزيز. للاطلاع على التفسير الكامل، يرجى مراجعة كتب التفسير المعتمدة كتفسير ابن كثير والطبري والسعدي رحمهم الله.`
    });
  }
  return placeholders;
}

let currentSurah = null;
let fontSize = 24;
let bookmarks = JSON.parse(localStorage.getItem('q_bookmarks') || '[]');

// ===== RENDER SURAH LIST =====
function renderSurahList(list) {
  const el = document.getElementById('surahList');
  el.innerHTML = list.map((s,i) => `
    <div class="surah-card" onclick="openSurah(${s.id})" style="animation-delay:${i*0.03}s">
      <div class="surah-num">${s.id}</div>
      <div class="surah-info">
        <div class="surah-name">${s.name}</div>
        <div class="surah-meta">${s.type} · ${s.ayahs} آية · ص ${s.page}</div>
      </div>
      <div class="surah-arabic">${s.arabic}</div>
    </div>
  `).join('');
}

function filterSurahs() {
  const q = document.getElementById('searchInput').value;
  const filtered = SURAHS.filter(s => s.name.includes(q) || s.arabic.includes(q) || String(s.id).includes(q));
  renderSurahList(filtered);
}

// ===== OPEN SURAH =====
function openSurah(id) {
  currentSurah = SURAHS.find(s=>s.id===id);
  if(!currentSurah) return;
  
  document.getElementById('readerTitle').textContent = 'سورة ' + currentSurah.name;
  document.getElementById('surahTypeBadge').textContent = currentSurah.type + ' · ' + currentSurah.ayahs + ' آية';
  
  // Hide bismillah for surah 9
  document.getElementById('bismillah').style.display = id === 9 ? 'none' : 'block';
  
  const ayahs = getAyahs(id, currentSurah.ayahs);
  const wrap = document.getElementById('ayahsWrap');
  wrap.innerHTML = ayahs.map((a,i) => `
    <div class="ayah-block" style="animation-delay:${i*0.05}s" id="ayah-${id}-${i+1}">
      <div class="ayah-text" style="font-size:${fontSize}px">
        <span class="ayah-num-badge">${i+1}</span>
        ${a.ar}
      </div>
      <div class="ayah-actions">
        <button class="ayah-btn tafsir-btn" onclick="toggleTafsir(${id},${i})">📖 التفسير</button>
        <button class="ayah-btn share-btn" onclick="shareAyah(${id},${i})">🔗 مشاركة</button>
        <button class="ayah-btn share-btn" onclick="toggleTrans(${id},${i})">🌐 الترجمة</button>
      </div>
      <div class="tafsir-panel" id="tafsir-${id}-${i}">
        <div class="tafsir-title">📚 التفسير</div>
        ${a.tafsir}
      </div>
      <div class="trans-panel" id="trans-${id}-${i}">
        <em>${a.en}</em>
      </div>
    </div>
  `).join('');
  
  showPage('reader');
  document.getElementById('readerWrap').style.display = 'block';
  window.scrollTo(0,0);
}

function toggleTafsir(sid, idx) {
  const el = document.getElementById(`tafsir-${sid}-${idx}`);
  el.classList.toggle('open');
}

function toggleTrans(sid, idx) {
  const el = document.getElementById(`trans-${sid}-${idx}`);
  el.classList.toggle('open');
}

function shareAyah(sid, idx) {
  const ayahs = getAyahs(sid, 999);
  const a = ayahs[idx];
  const surah = SURAHS.find(s=>s.id===sid);
  const text = `${a.ar}\n\n[سورة ${surah.name} - الآية ${idx+1}]`;
  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ الآية'));
  }
}

function goBack() {
  showPage('list');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(name==='list') document.getElementById('nav-list').classList.add('active');
}

function showBookmarks() {
  showToast('قريباً: حفظ الآيات المفضلة 🔖');
}

function focusSearch() {
  showPage('list');
  document.getElementById('searchInput').focus();
}

function changeFontSize(delta) {
  fontSize = Math.min(36, Math.max(16, fontSize + delta));
  document.querySelectorAll('.ayah-text').forEach(el => el.style.fontSize = fontSize+'px');
}

function toggleFontSize() {
  changeFontSize(fontSize >= 30 ? -8 : 4);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Init
renderSurahList(SURAHS);
</script>
